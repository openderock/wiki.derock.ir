stages:
  - build
  - deploy

variables:
  NODE_ENV: production

cache:
  paths:
    - node_modules/

build_site:
  image: node:25
  stage: build
  before_script:
    - npm config set registry https://package-mirror.liara.ir/repository/npm/ --global
    - npm ping
  script:
    - npm i
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  only:
    - master

deploy_site:
  stage: deploy
  image: node:25
  needs:
    - job: build_site
      artifacts: true
  only:
    - master
  script:
    # Use npx to run s3-deploy without needing to install it globally
    - npx s3-deploy './dist/**' \
        --cwd ./dist \
        --bucket "wiki-derock" \
        --endpoint "s3.ir-thr-at1.arvanstorage.ir" \
        --accessKeyId "$ARVAN_ACCESS_KEY" \
        --secretAccessKey "$ARVAN_SECRET_KEY" \
        --public \
        --deleteRemoved