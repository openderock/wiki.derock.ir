stages:
  - build
  - deploy

# ---------- BUILD STAGE ----------
build_site:
  image: node:25
  stage: build
  only:
    - master
  cache:
    paths:
      - node_modules/
  before_script:
    # - npm config set registry https://package-mirror.liara.ir/repository/npm/ --global
    - npm config set registry https://hub.megan.ir/npm --global
    - npm ping
  script:
    - npm i
    - npm run build   # Astro/Starlight builds into dist/
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

# ---------- DEPLOY STAGE ----------
deploy_site:
  image: amazon/aws-cli
  stage: deploy
  needs:
    - job: build_site
      artifacts: true
  only:
    - master
  before_script:
    # Configure AWS CLI with ArvanCloud S3 credentials
    - aws configure set aws_access_key_id "$ARVAN_ACCESS_KEY"
    - aws configure set aws_secret_access_key "$ARVAN_SECRET_KEY"
    - aws configure set default.region us-east-1
  script:
    # Sync dist/ → ArvanCloud bucket
    # aws s3 sync already avoids re-uploading unchanged files.
    # --size-only makes it ignore timestamp-only differences.
    - aws s3 sync dist s3://wiki-derock --endpoint-url https://s3.ir-thr-at1.arvanstorage.ir --delete --acl public-read --size-only

